# AI Diary System — 全域設定

# Recall 評分權重（第六軸 arousal_match 為純加性；RRF 只看排名，總和不必=1.0）
recall:
  weights:
    keyword:       0.30   # インデックス keyword pool ヒット（全文 grep 不要）
    roi:           0.20   # ROI 局所感情ピーク文ヒット × valence 一致
    recency:       0.20   # 日期越近越高（flashbulb は 730日半減）
    emotional:     0.20   # emotional_intensity 欄位
    valence_match: 0.10   # valence 方向匹配（論文 Anthropic 2026 啟發）
    arousal_match: 0.08   # 第六維度：喚起度一致性(0–10)。未指定 --arousal 時對排序零影響
  top_k: 5
  recency_halflife_days: 30    # 一般記憶，30天半衰

# 閃光燈記憶衰減（較慢）
flashbulb:
  recency_halflife_days: 730   # 2年半衰

# 鞏固門檻（buffer → 日記）
consolidation:
  discard_below:  4            # intensity ≤ 3 丟棄
  merge_range:  [4, 6]         # intensity 4-6 合併寫一篇
  solo_above:     7            # intensity ≥ 7 單獨成篇

# ── Summarize 設定
summarize:
  skip_flashbulb: true         # flashbulb 篇不壓縮，但仍進週摘要 ⚡ 區塊
  weekly_day: 6                # 每週日（0=Mon, 6=Sun）自動摘要

# Buffer 設定
buffer:
  file: diary/buffer.jsonl
  max_age_hours: 24            # 超過 24h 未鞏固 → 強制 consolidate

# Phase A: 時間衰減（decay_weight）設定
decay:
  # 基礎 importance（由 emotional_intensity 換算）
  # 最終衰減值 = max(base_importance × exp(-ln2 × days / halflife), floor)
  halflife_by_intensity:
    flashbulb:   730           # 閃光燈：2年半衰
    high:        90            # intensity 8-9：3個月半衰
    medium:      60            # intensity 6-7：2個月半衰
    normal:      30            # intensity 1-5：1個月半衰
  floor_by_intensity:
    flashbulb:   0.50          # 閃光燈永不低於 0.50
    high:        0.15          # intensity 8-9 永不低於 0.15
    medium:      0.10          # intensity 6-7 永不低於 0.10
    normal:      0.05          # 一般永不低於 0.05
  recall_boost:  0.10          # 每次被 recall 時 decay_weight 活化 +0.10

# ── L2 Scenario 設定（Phase 1）────────────────────────────
scenario:
  enabled: true
  window_days: 30                  # 增量掃描窗（日）
  min_members: 2
  max_members: 12
  # C1: IDF-weighted Jaccard 閾值
  # ⚠️ 語料 N≦30 階段數值偏低，50 篇以上建議升至 0.30
  idf_jaccard_threshold: 0.20
  # C1b fallback: 稀少 tag 共有（IDF 高 tag 1 個 + 近時間）
  rare_tag_idf_threshold: 2.0     # 這個 IDF 以上視為「稀少」
  rare_shared_sum_min: 2.0        # 稀少 tag IDF 合計 >= 這個值 → fallback 連接
  rare_shared_window_days: 7      # fallback 適用最大時間差（日）
  # C2: 時間窗
  time_span_days: 14
  flashbulb_radius_days: 30
  # C4: 情緒承載門檻
  min_max_intensity: 6
  min_mean_intensity: 5.0
  # 增量模式：既有 scenario 不移除 member
  monotonic_growth: true
  # recall.py Strategy D 設定
  recall:
    enabled: true
    # 注意：Scenario Boost 的權重「不在」這裡設定（此處任何 weight 欄位引擎都不會讀）。
    # 實際 boost 寫死在 src/recall.py 的 SCENARIO_BOOST=0.08（調校過的甜蜜點，議會裁定不接 config）。
    # 如要調整請直接改 recall.py 並跑 fixtures 比對。
    drill_down: true
    drill_down_top: 2
